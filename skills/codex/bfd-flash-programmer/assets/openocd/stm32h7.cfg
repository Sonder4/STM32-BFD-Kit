source [find interface/stlink.cfg]

transport select hla_swd

set CHIPNAME STM32H7
set BOARDNAME STM32H7

set ENABLE_LOW_POWER 1
set STOP_WATCHDOG 1

source [find target/stm32h7x.cfg]

reset_config srst_only

adapter speed 4000

$_TARGETNAME configure -event gdb-attach {
    echo "Debugger attached: halting execution"
    reset halt
    gdb_breakpoint_override hard
}

$_TARGETNAME configure -event gdb-detach {
    echo "Debugger detached: resuming execution"
    resume
}

$_TARGETNAME configure -event reset-init {
    adapter speed 4000
}

proc stm32h7_flash_program {firmware_file} {
    reset halt
    flash write_image erase $firmware_file 0x08000000
    verify_image $firmware_file 0x08000000
    reset run
}

proc stm32h7_mass_erase {} {
    reset halt
    flash erase_sector 0 0 last
}

proc stm32h7_bank1_erase {} {
    reset halt
    flash erase_sector 0 0 last
}

proc stm32h7_bank2_erase {} {
    reset halt
    flash erase_sector 1 0 last
}

proc stm32h7_read_flash {output_file size} {
    reset halt
    dump_image $output_file 0x08000000 $size
}

proc stm32h7_unlock {} {
    reset halt
    mww 0x5200201c 0x45670123
    mww 0x5200201c 0xCDEF89AB
    mww 0x5200211c 0x45670123
    mww 0x5200211c 0xCDEF89AB
}

proc stm32h7_option_bytes_read {} {
    reset halt
    mdw 0x5200201c
    mdw 0x5200211c
}

proc stm32h7_dual_bank_swap {} {
    reset halt
    mww 0x52002008 0x08192A3B
    mww 0x52002008 0x4C5D6E7F
    mww 0x52002008 0x08192A3B
    mww 0x52002008 0x4C5D6E7F
    flash protect 0 0 last off
    flash protect 1 0 last off
}

init
targets
